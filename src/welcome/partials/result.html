<section class="wl-step wl-step--result" data-step="result" hidden>

  <!-- Ambient background -->
  <div class="wl-result__ambient-bg" aria-hidden="true"></div>
  <div class="wl-result__video-overlay" aria-hidden="true"></div>

  <div class="wl-result__inner">

    <p class="wl-result__eyebrow" id="resultEyebrow">Based on your answers</p>

    <h2 class="wl-result__headline" id="resultHeadline">
      Good news — it makes a lot of sense<br>
      <em>for us to build this for you.</em>
    </h2>

    <p class="wl-result__sub" id="resultSub">Here's what your answers actually tell us.</p>

    <!-- Dynamic answer chips -->
    <div class="wl-result__chips" id="resultChips"></div>

    <!-- Dynamic breakdown -->
    <div class="wl-result__breakdown" id="resultBreakdown"></div>

    <!-- Dynamic ROI -->
    <div class="wl-result__roi" id="resultRoi"></div>

    <!-- Dynamic close -->
    <div class="wl-result__close" id="resultClose"></div>

    <button class="wl-btn wl-btn--primary wl-btn--large" id="resultCtaBtn" data-action="go-to-offer">
      Yes, Build My Site For Me — See What's Included
      <span class="wl-btn__arrow">→</span>
    </button>

  </div>

</section>
