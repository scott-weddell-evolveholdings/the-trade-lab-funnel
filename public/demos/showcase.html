<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opening Demo Showcase</title>
  <script>
    const params = new URLSearchParams(window.location.search)
    const demo = params.get('demo') || 'hero'
    window.location.replace(`/demo.html?demo=${encodeURIComponent(demo)}`)
  </script>
</head>
<body>
  <a href="/demo.html?demo=hero">Open demo showcase</a>
</body>
</html>
